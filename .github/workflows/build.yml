name: Build and Release

on:
  push:
    branches: [ main, windows-completion ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: macos

    - name: Download models
      run: |
        mkdir -p models
        if [ ! -f "models/ggml-base.bin" ]; then
          curl -L --retry 3 --retry-delay 5 -o models/ggml-base.bin "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin"
        fi
        if [ ! -f "models/smollm2-360m-q8.gguf" ]; then
          curl -L --retry 3 --retry-delay 5 -o models/smollm2-360m-q8.gguf "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct-GGUF/resolve/main/smollm2-360m-instruct-q8_0.gguf"
        fi

    - name: Build
      env:
        CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      run: cargo build --release

    - name: Package DMG
      run: |
        bash scripts/build-dmg.sh 0.1.0

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EchoVoice-macOS
        path: |
          target/EchoVoice-*.dmg
          target/release/echovoice

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: windows

    - name: Install LLVM and WiX
      run: |
        choco install llvm wixtoolset -y --no-progress
        echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
        echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

    - name: Download models
      shell: bash
      run: |
        mkdir -p models
        if [ ! -f "models/ggml-base.bin" ]; then
          curl -L --retry 3 --retry-delay 5 -o models/ggml-base.bin "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin" || echo "Model download failed, continuing..."
        fi
        if [ ! -f "models/smollm2-360m-q8.gguf" ]; then
          curl -L --retry 3 --retry-delay 5 -o models/smollm2-360m-q8.gguf "https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct-GGUF/resolve/main/smollm2-360m-instruct-q8_0.gguf" || echo "Model download failed, continuing..."
        fi

    - name: Build
      env:
        CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        LIBCLANG_PATH: "C:\Program Files\LLVM\bin"
        RUSTFLAGS: "-C link-arg=/FORCE:MULTIPLE"
      run: cargo build --release

    - name: Create MSI Installer
      if: success()
      shell: bash
      run: |
        # Create installer directory
        mkdir -p installer
        cp target/release/echovoice.exe installer/
        cp -r models installer/ 2>/dev/null || true

        # Create WiX source file
        cat > installer/product.wxs << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
          <Product Id="*" Name="EchoVoice" Language="1033" Version="0.1.0" Manufacturer="EchoVoice Team" UpgradeCode="12345678-1234-1234-1234-123456789012">
            <Package InstallerVersion="200" Compressed="yes" InstallScope="perMachine" />
            <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
            <MediaTemplate />
            <Feature Id="ProductFeature" Title="EchoVoice" Level="1">
              <ComponentGroupRef Id="ProductComponents" />
            </Feature>
          </Product>
          <Fragment>
            <Directory Id="TARGETDIR" Name="SourceDir">
              <Directory Id="ProgramFilesFolder">
                <Directory Id="INSTALLFOLDER" Name="EchoVoice">
                  <Component Id="MainExecutable" Guid="*">
                    <File Id="EchoVoiceEXE" Name="echovoice.exe" Source="installer\echovoice.exe" KeyPath="yes" />
                  </Component>
                </Directory>
              </Directory>
              <Directory Id="ProgramMenuFolder">
                <Directory Id="ApplicationProgramsFolder" Name="EchoVoice" />
              </Directory>
            </Directory>
          </Fragment>
          <Fragment>
            <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
              <ComponentRef Id="MainExecutable" />
            </ComponentGroup>
          </Fragment>
        </Wix>
        EOF

        # Build MSI
        candle.exe -o installer/product.wixobj installer/product.wxs
        light.exe -o installer/EchoVoice-0.1.0-x64.msi installer/product.wixobj

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EchoVoice-Windows
        path: |
          target/release/echovoice.exe
          target/release/*.dll
          installer/*.msi

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure
      run: ls -R artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        files: |
          artifacts/EchoVoice-macOS/**
          artifacts/EchoVoice-Windows/**
        draft: true
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
